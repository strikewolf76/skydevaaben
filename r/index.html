<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Skydevaaben Redirects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at top, #4f46e5 0%, #1e1b4b 42%, #0b1025 100%);
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #f8fafc;
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
    }
    .hero {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.4);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0.2px;
    }
    .subline {
      margin: 0;
      color: #cbd5e1;
      font-size: 15px;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .filter-control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-control label {
      font-size: 13px;
      color: #cbd5e1;
    }
    select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.78);
      color: #f8fafc;
      font-size: 15px;
      outline: none;
    }
    .status-row {
      margin: 6px 0 16px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: rgba(15, 23, 42, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(2, 6, 23, 0.35);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(129, 140, 248, 0.6);
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #f8fafc;
    }
    .card-meta {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
    }
    .card-link {
      color: #e2e8f0;
      text-decoration: none;
      display: inline-block;
      padding: 8px 14px;
      background: rgba(99, 102, 241, 0.35);
      border-radius: 6px;
      transition: background 0.2s ease;
      font-size: 14px;
    }
    .card-link:hover {
      background: rgba(99, 102, 241, 0.55);
    }
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      background: rgba(15, 23, 42, 0.5);
      border: 1px dashed rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      padding: 28px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Skydevaaben Redirect Pages</h1>
      <p class="subline">Browse live redirect links by artist, song, and platform.</p>
    </div>
    <div class="filters">
      <div class="filter-control">
        <label for="artistFilter">Artist</label>
        <select id="artistFilter">
          <option value="all">All Artists</option>
        </select>
      </div>
      <div class="filter-control">
        <label for="songFilter">Song</label>
        <select id="songFilter">
          <option value="all">All Songs</option>
        </select>
      </div>
      <div class="filter-control">
        <label for="platformFilter">Platform</label>
        <select id="platformFilter">
          <option value="all">All Platforms</option>
          <option value="fb">Facebook</option>
          <option value="ig">Instagram</option>
          <option value="tt">TikTok</option>
          <option value="yt">YouTube</option>
        </select>
      </div>
    </div>
    <div class="status-row" id="resultsInfo"></div>
    <div class="grid" id="cardsGrid">
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const platformNames = { fb: 'Facebook', ig: 'Instagram', tt: 'TikTok', yt: 'YouTube' };
    const songArtists = window.songArtists || {};

    function inferArtist(song) {
      if (songArtists[song]) return songArtists[song];
      if (/^(ba|bl|afl|pl)/.test(song)) return 'After Brügge';
      return 'Skydevaaben';
    }

    function parseSlug(slug) {
      const match = slug.match(/^([a-z]{2})(.+?)(\d+)$/i);
      if (!match) return null;
      return {
        platform: match[1].toLowerCase(),
        song: match[2].toLowerCase(),
        version: match[3]
      };
    }

    const data = window.slugs
      .filter(slug => !slug.startsWith('shorturl/'))
      .map(slug => {
      const parsed = parseSlug(slug);
      if (!parsed) return null;

      const { platform, song, version } = parsed;
      if (!platformNames[platform] || !window.songNames[song]) return null;

      const artist = inferArtist(song);
      return {
        slug: slug,
        platform: platform,
        song: song,
        version: version,
        artist: artist,
        title: window.songNames[song],
        image: window.songImages[song]
      };
    })
    .filter(Boolean);

    data.sort((a, b) => a.title.localeCompare(b.title));

    const songFilter = document.getElementById('songFilter');
    const platformFilter = document.getElementById('platformFilter');
    const artistFilter = document.getElementById('artistFilter');
    const grid = document.getElementById('cardsGrid');
    const resultsInfo = document.getElementById('resultsInfo');

    Array.from(new Set(data.map(item => item.song)))
      .sort((a, b) => window.songNames[a].localeCompare(window.songNames[b]))
      .forEach(song => {
      const option = document.createElement('option');
      option.value = song;
      option.textContent = window.songNames[song];
      songFilter.appendChild(option);
    });

    Array.from(new Set(data.map(item => item.artist)))
      .sort((a, b) => a.localeCompare(b))
      .forEach(artist => {
        const option = document.createElement('option');
        option.value = artist;
        option.textContent = artist;
        artistFilter.appendChild(option);
      });

    function renderCards(filteredData) {
      grid.innerHTML = '';

      if (!filteredData.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No redirects match the current filters.';
        grid.appendChild(empty);
        return;
      }

      filteredData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${item.image}" alt="${item.title}">
          <div class="card-content">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">${item.artist} · ${platformNames[item.platform]} · r${item.version}</div>
            <a href="https://skydevaaben.no/r/${item.slug}/" class="card-link">Open Redirect</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterData() {
      const songValue = songFilter.value;
      const platformValue = platformFilter.value;
      const artistValue = artistFilter.value;
      const filtered = data.filter(item => {
        return (songValue === 'all' || item.song === songValue) &&
               (platformValue === 'all' || item.platform === platformValue) &&
               (artistValue === 'all' || item.artist === artistValue);
      });

      resultsInfo.textContent = `${filtered.length} redirect${filtered.length === 1 ? '' : 's'} shown`;
      renderCards(filtered);
    }

    songFilter.addEventListener('change', filterData);
    platformFilter.addEventListener('change', filterData);
    artistFilter.addEventListener('change', filterData);

    filterData();
  </script>
</body>
</html>
